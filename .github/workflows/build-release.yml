name: Build Luna Panel Release

# Builds a prebuilt panel.tar.gz (with compiled themed assets) and attaches it
# to the GitHub Release. The installer downloads this artifact so target servers
# never need Node/Yarn — only Composer.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, curl, gd, intl, mbstring, mysql, pdo, tokenizer, xml, zip
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build themed assets
        run: yarn build:production

      - name: Create panel.tar.gz
        run: |
          tar -czf panel.tar.gz \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./node_modules' \
            --exclude='./installer' \
            --exclude='./tests' \
            --exclude='./preview' \
            --exclude='./panel.tar.gz' \
            --exclude='./.env' \
            --exclude='./.env.ci' \
            .

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: panel.tar.gz

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: panel
          path: panel.tar.gz
